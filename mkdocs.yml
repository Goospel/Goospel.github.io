site_name: Goospel's Learning Notes
site_description: 작업 중 모르고 물어봐서 배운 기술 개념 누적 — 발표 / 면접 / Q&A 대비
site_author: Goospel
site_url: https://goospel.github.io/
repo_name: Goospel/goospel.github.io
repo_url: https://github.com/Goospel/goospel.github.io
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Goospel — 학습 노트는 누구나 자유롭게 참고 가능

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Pretendard
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Goospel
  generator: false

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

nav:
  - 홈: index.md
  - Playbook:
    - playbook/learning-pipeline.md
  - 프로젝트:
    - projects/index.md
    - Moodiary (졸업 BE): projects/moodiary.md
  - 학습 노트:
    - notes/index.md
    - 인증 / 보안:
      - notes/auth/jwt-refresh-token.md
      - notes/auth/sha256-token-storage.md
      - notes/auth/bcrypt-vs-sha256.md
      - notes/auth/refresh-token-rotation.md
      - notes/auth/jwt-stateless-vs-refresh-stateful.md
    - 데이터베이스:
      - notes/db/hibernate-ddl-auto-limits.md
      - notes/db/mysql-utf8mb4-trap.md
    - 백엔드 / Spring:
      - notes/backend/spring-async-pattern.md
      - notes/backend/cors-fundamentals.md
    - 운영 / CI·CD:
      - notes/ops/ci-vs-cd-branch-strategy.md
      - notes/ops/aws-ssm-automation-scope.md
      - notes/ops/aws-ssm-outbound-polling.md
